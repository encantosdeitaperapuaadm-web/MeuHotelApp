<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camareira - Hotel Encantos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f2f5f9;
      color: #243447;
      padding: 16px;
    }

    header {
      background: linear-gradient(135deg, #1a3a6b, #2196F3);
      color: white;
      border-radius: 14px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(26, 58, 107, 0.18);
    }

    .header-info h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .header-info p {
      font-size: 13px;
      opacity: 0.92;
    }

    .btn-sair {
      background: rgba(255,255,255,0.18);
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 13px;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .resumo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .resumo-card {
      background: white;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
      text-align: center;
    }

    .resumo-card strong {
      display: block;
      font-size: 22px;
      color: #1a3a6b;
      margin-bottom: 4px;
    }

    .resumo-card span {
      font-size: 12px;
      color: #666;
    }

    .filtros {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filtro-btn {
      border: none;
      background: white;
      color: #555;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .filtro-btn.ativo {
      background: #1a3a6b;
      color: white;
    }

    .ala-bloco {
      margin-bottom: 18px;
    }

    .ala-titulo {
      background: #e8f0fb;
      color: #1a3a6b;
      border-left: 5px solid #1a3a6b;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .quartos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .quarto-card {
      background: white;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border: 2px solid #e8edf3;
    }

    .quarto-topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .quarto-numero {
      font-size: 24px;
      font-weight: bold;
      color: #1a3a6b;
      line-height: 1;
    }

    .quarto-meta {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .badge-status {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
    }

    .status-disponivel { background: #d4edda; color: #155724; }
    .status-ocupado { background: #f8d7da; color: #721c24; }
    .status-em_limpeza { background: #fff3cd; color: #856404; }
    .status-interditado { background: #f3e5f5; color: #4a235a; }

    .quarto-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .info-box {
      background: #f7f9fc;
      border-radius: 10px;
      padding: 10px;
    }

    .info-box small {
      display: block;
      font-size: 11px;
      color: #777;
      margin-bottom: 4px;
    }

    .info-box strong {
      font-size: 13px;
      color: #243447;
    }

    .tarefas {
      display: grid;
      gap: 8px;
    }

    .btn-tarefa {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      color: white;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-limpeza { background: #1a6b3c; }
    .btn-enxoval { background: #e67e22; }
    .btn-checkout { background: #c0392b; }

    .btn-tarefa:disabled {
      background: #b9c2cc;
      cursor: not-allowed;
    }

    .observacao {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      background: #f8fafc;
      border-radius: 10px;
      padding: 10px;
    }

    .vazio {
      background: white;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #777;
      box-shadow: 0 3px 12px rgba(0,0,0,0.08);
    }

    .mensagem {
      display: none;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
    }

    .msg-sucesso {
      background: #d4edda;
      color: #155724;
    }

    .msg-erro {
      background: #f8d7da;
      color: #721c24;
    }

    @media (max-width: 700px) {
      header {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-sair {
        text-align: center;
      }

      .quarto-info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-info">
    <h1>🧹 Camareiras</h1>
    <p>Visualize toda a ala, mesmo com quartos limpos, e registre a tarefa correta.</p>
    <p style="margin-top:6px;font-size:13px;">
    👤 Camareira: <strong id="nome-camareira-logada">Não identificada</strong>
  </p>
</div>
    <a class="btn-sair" href="login.html">← Sair</a>
  </header>

  <div id="msg" class="mensagem msg-sucesso"></div>

  <section class="resumo">
    <div class="resumo-card">
      <strong id="total-quartos">0</strong>
      <span>Total de quartos</span>
    </div>
    <div class="resumo-card">
      <strong id="total-ocupados">0</strong>
      <span>Ocupados</span>
    </div>
    <div class="resumo-card">
      <strong id="total-limpando">0</strong>
      <span>Em limpeza</span>
    </div>
    <div class="resumo-card">
      <strong id="total-disponiveis">0</strong>
      <span>Disponíveis</span>
    </div>
  </section>

  <section class="filtros">
    <button class="filtro-btn ativo" onclick="aplicarFiltro('todos', this)">Todos</button>
    <button class="filtro-btn" onclick="aplicarFiltro('ocupado', this)">Ocupados</button>
    <button class="filtro-btn" onclick="aplicarFiltro('em_limpeza', this)">Limpando</button>
    <button class="filtro-btn" onclick="aplicarFiltro('disponivel', this)">Disponíveis</button>
    <button class="filtro-btn" onclick="aplicarFiltro('interditado', this)">Interditados</button>
  </section>

  <div id="lista-alas"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let quartos = [];
    let filtroAtual = 'todos';
    let nomeCamareira = '';

function obterNomeCamareira() {
  const params = new URLSearchParams(window.location.search);
  const nomeUrl = params.get('nome');

  if (nomeUrl && nomeUrl.trim()) {
    return nomeUrl.trim();
  }

  if (window.nomeCamareiraSelecionada && String(window.nomeCamareiraSelecionada).trim()) {
    return String(window.nomeCamareiraSelecionada).trim();
  }

  return '';
}

function atualizarNomeNoTopo() {
  const el = document.getElementById('nome-camareira-logada');
  if (!el) return;
  el.textContent = nomeCamareira || 'Não identificada';
}

    socket.on('update', () => {
      carregarQuartos();
    });

    function traduzirStatus(status) {
      const mapa = {
        disponivel: 'Disponível',
        ocupado: 'Ocupado',
        em_limpeza: 'Em limpeza',
        interditado: 'Interditado'
      };
      return mapa[status] || status;
    }

    function mostrarMensagem(texto, tipo = 'sucesso') {
      const msg = document.getElementById('msg');
      msg.className = 'mensagem ' + (tipo === 'erro' ? 'msg-erro' : 'msg-sucesso');
      msg.textContent = texto;
      msg.style.display = 'block';
      setTimeout(() => {
        msg.style.display = 'none';
      }, 3500);
    }

    async function carregarQuartos() {
      try {
        const res = await fetch('/quartos');
        quartos = await res.json();

        atualizarResumo();
        renderizarQuartos();
      } catch (err) {
        mostrarMensagem('Erro ao carregar quartos.', 'erro');
      }
    }

    function atualizarResumo() {
      document.getElementById('total-quartos').textContent = quartos.length;
      document.getElementById('total-ocupados').textContent = quartos.filter(q => q.status === 'ocupado').length;
      document.getElementById('total-limpando').textContent = quartos.filter(q => q.status === 'em_limpeza').length;
      document.getElementById('total-disponiveis').textContent = quartos.filter(q => q.status === 'disponivel').length;
    }

    function aplicarFiltro(status, botao) {
      filtroAtual = status;
      document.querySelectorAll('.filtro-btn').forEach(btn => btn.classList.remove('ativo'));
      botao.classList.add('ativo');
      renderizarQuartos();
    }

    function podeExecutarTarefa(quarto) {
      return quarto.status !== 'interditado';
    }

    function renderizarQuartos() {
      const container = document.getElementById('lista-alas');
      const alas = [
        'Bloco A - Térreo',
        'Bloco A - 1º Andar',
        'Bloco B - Térreo',
        'Bloco B - 1º Andar'
      ];

      let html = '';

      alas.forEach(ala => {
        let quartosAla = quartos.filter(q => q.ala === ala);

        if (filtroAtual !== 'todos') {
          quartosAla = quartosAla.filter(q => q.status === filtroAtual);
        }

        if (!quartosAla.length) return;

        html += `<section class="ala-bloco">
          <div class="ala-titulo">📍 ${ala}</div>
          <div class="quartos-grid">`;

        quartosAla.forEach(q => {
          const desabilitado = !podeExecutarTarefa(q) ? 'disabled' : '';
          const aviso = q.status === 'interditado'
            ? 'Quarto interditado. Nenhuma tarefa pode ser iniciada.'
            : q.status === 'em_limpeza'
            ? 'Este quarto já está com limpeza em andamento.'
            : 'Escolha a tarefa correta conforme a rotina do dia.';

          html += `
            <div class="quarto-card">
              <div class="quarto-topo">
                <div>
                  <div class="quarto-numero">${String(q.numero).padStart(2, '0')}</div>
                  <div class="quarto-meta">${q.categoria} • ${q.ala}</div>
                </div>
                <div class="badge-status status-${q.status}">${traduzirStatus(q.status)}</div>
              </div>

              <div class="quarto-info">
                <div class="info-box">
                  <small>Categoria</small>
                  <strong>${q.categoria}</strong>
                </div>
                <div class="info-box">
                  <small>Status atual</small>
                  <strong>${traduzirStatus(q.status)}</strong>
                </div>
              </div>

              <div class="tarefas">
                <button class="btn-tarefa btn-limpeza" ${desabilitado} onclick="registrarTarefa(${q.numero}, 'arrumacao', 'Limpeza do quarto com troca de piso')">
                  🧹 Limpeza
                </button>
                <button class="btn-tarefa btn-enxoval" ${desabilitado} onclick="registrarTarefa(${q.numero}, 'troca_enxoval', 'Limpeza do quarto + troca de enxoval')">
                  🛏️ Troca de enxoval
                </button>
                <button class="btn-tarefa btn-checkout" ${desabilitado} onclick="registrarTarefa(${q.numero}, 'checkout', 'Check-out com limpeza geral e troca total do enxoval')">
                  🚪 Check-out
                </button>
              </div>

              <div class="observacao">${aviso}</div>
            </div>
          `;
        });

        html += `</div></section>`;
      });

      if (!html) {
        html = `<div class="vazio">Nenhum quarto encontrado para este filtro.</div>`;
      }

      container.innerHTML = html;
    }

    async function registrarTarefa(numero, tipo, descricao) {
  if (!nomeCamareira) {
    mostrarMensagem('Camareira não identificada. Volte ao login e entre novamente.', 'erro');
    return;
  }

  const hoje = new Date().toISOString().slice(0, 10);

  try {
    const resCronometro = await fetch('/cronometro/iniciar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        quarto_numero: numero,
        camareira: nomeCamareira,
        tipo_servico: tipo
      })
    });

    const retornoCronometro = await resCronometro.json();

    if (!resCronometro.ok) {
      mostrarMensagem(retornoCronometro.error || 'Não foi possível iniciar a tarefa.', 'erro');
      return;
    }

    const detalhes = tipo === 'troca_enxoval'
      ? 'Troca programada de enxoval'
      : tipo === 'checkout'
      ? 'Limpeza geral com troca total de enxoval'
      : 'Troca de piso';

    const resRegistro = await fetch('/limpeza-quarto', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        quarto_numero: numero,
        camareira_nome: nomeCamareira,
        tipo_servico: tipo,
        detalhes_enxoval: detalhes,
        data: hoje
      })
    });

    const retornoRegistro = await resRegistro.json();

    if (!resRegistro.ok) {
      mostrarMensagem(retornoRegistro.error || 'Cronômetro iniciado, mas falhou ao registrar tarefa.', 'erro');
      return;
    }

    mostrarMensagem(`Tarefa iniciada no apto ${numero}: ${descricao}`);
    carregarQuartos();
  } catch (err) {
    mostrarMensagem('Erro ao registrar tarefa.', 'erro');
  }
}

    nomeCamareira = obterNomeCamareira();
    atualizarNomeNoTopo();
    carregarQuartos();
  </script>
</body>
</html>
