<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepção - Hotel Encantos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 15px; }
        header { background: #1a3a6b; color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #fff; padding: 5px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; color: #666; transition: 0.3s; }
        .tab.active { background: #1a3a6b; color: white; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { font-size: 16px; color: #1a3a6b; margin-bottom: 15px; border-left: 4px solid #1a3a6b; padding-left: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; color: white; }
        .btn-blue { background: #1a3a6b; }
        .btn-green { background: #27ae60; }
        .btn-red { background: #c0392b; }
        .grid-quartos { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .quarto-card { padding: 15px 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .quarto-card:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .status-disponivel { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .status-ocupado { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
        .status-limpeza { background: #fff3cd; color: #856404; border-color: #ffeeba; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>
    <header>
        <h3>🏨 Recepção</h3>
        <a href="login.html" style="color: white; text-decoration: none; font-size: 14px;">Sair</a>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="showTab('mapa')">Mapa</div>
        <div class="tab" onclick="showTab('import')">Importar</div>
        <div class="tab" onclick="showTab('manut')">Manutenção</div>
        <div class="tab" onclick="showTab('atividades')">📋 Hoje</div>
    </div>

    <div id="tab-mapa" class="content">
        <div class="card">
            <h2>Mapa de Quartos</h2>
            <div id="grid-quartos" class="grid-quartos">Carregando...</div>
        </div>
    </div>

    <div id="tab-import" class="content" style="display:none">
        <div class="card">
            <h2>Importar HITS (CSV)</h2>
            <input type="file" id="csv-input" accept=".csv">
            <button class="btn btn-blue" onclick="processCSV()">Analisar Arquivo</button>
            <div id="import-resumo" style="margin-top:15px; display:none"></div>
        </div>
    </div>

    <div id="tab-manut" class="content" style="display:none">
        <div class="card">
            <h2>Abrir Manutenção</h2>
            <select id="manut-quarto"></select>
            <textarea id="manut-obs" placeholder="Descreva o problema..."></textarea>
            <button class="btn btn-blue" onclick="saveManut()">Registrar Chamado</button>
        </div>

        <div class="card">
            <h2>Chamados Abertos</h2>
            <div id="lista-manut"></div>
            </div>
        </div>

        <div id="tab-atividades" class="content" style="display:none;">
        <div class="card">
            <h2>📋 Atividades do dia</h2>
            <div id="lista-atividades">Carregando...</div>
        </div>

    <!-- Modal Ações Quarto -->
    <div id="modal-quarto" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-bottom:15px">Apto</h3>
            <div id="quarto-info" style="margin-bottom:20px; font-size:14px; color:#666"></div>
            
            <div id="form-checkin">
                <input type="text" id="hospede" placeholder="Nome do Hóspede">
                <div style="display:flex; gap:10px">
                    <input type="number" id="adultos" placeholder="Adultos" value="2">
                    <input type="number" id="criancas" placeholder="Crianças" value="0">
                </div>
                <button class="btn btn-green" onclick="doCheckin()">Realizar Check-in</button>
            </div>
            
            <button id="btn-checkout" class="btn btn-red" style="display:none" onclick="doCheckout()">Realizar Check-out</button>
            <button class="btn" style="background:#888; margin-top:10px" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let selectedQuarto = null;

        async function loadQuartos() {
            const res = await fetch('/quartos');
            const quartos = await res.json();
            const grid = document.getElementById('grid-quartos');
            const selectManut = document.getElementById('manut-quarto');
            
            grid.innerHTML = '';
            selectManut.innerHTML = '<option value="">Selecione o quarto...</option>';

            quartos.forEach(q => {
                const div = document.createElement('div');
                div.className = `quarto-card status-${q.status.replace('_','')}`;
                div.innerHTML = `<strong>${q.numero}</strong><br><small>${q.categoria}</small>`;
                div.onclick = () => openModal(q);
                grid.appendChild(div);

                const opt = document.createElement('option');
                opt.value = q.numero;
                opt.textContent = `Apto ${q.numero}`;
                selectManut.appendChild(opt);
            });
        }

        function openModal(q) {
            selectedQuarto = q;
            document.getElementById('modal-title').textContent = `Apto ${q.numero}`;
            document.getElementById('quarto-info').textContent = `${q.ala} | ${q.categoria}`;
            
            const formIn = document.getElementById('form-checkin');
            const btnOut = document.getElementById('btn-checkout');

            if(q.status === 'ocupado') {
                formIn.style.display = 'none';
                btnOut.style.display = 'block';
            } else {
                formIn.style.display = 'block';
                btnOut.style.display = 'none';
            }
            
            document.getElementById('modal-quarto').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-quarto').style.display = 'none';
        }

        async function doCheckin() {
            const data = {
                quarto_numero: selectedQuarto.numero,
                nome_hospede: document.getElementById('hospede').value,
                adultos: document.getElementById('adultos').value,
                criancas: document.getElementById('criancas').value,
                checkin: new Date().toISOString().split('T')[0],
                checkout: new Date().toISOString().split('T')[0] // Simplificado
            };
            await fetch('/checkin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            closeModal();
            loadQuartos();
        }

        async function doCheckout() {
            if(!confirm('Confirmar check-out?')) return;
            await fetch('/checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({quarto_numero: selectedQuarto.numero})
            });
            closeModal();
            loadQuartos();
        }

        async function saveManut() {
            const data = {
                quarto_numero: document.getElementById('manut-quarto').value,
                observacao: document.getElementById('manut-obs').value
            };
            await fetch('/manutencao', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert('Chamado aberto!');
            document.getElementById('manut-obs').value = '';
            loadManut();
        }

        async function loadManut() {
            const res = await fetch('/manutencao');
            const lista = await res.json();
            const div = document.getElementById('lista-manut');
            div.innerHTML = lista.map(m => `
                <div style="padding:10px; border-bottom:1px solid #eee; font-size:13px">
                    <strong>Apto ${m.quarto_numero}</strong>: ${m.observacao}
                    <br><small>${m.status === 'resolvido' ? '✅ Resolvido' : '⏳ Pendente'}</small>
                </div>
            `).join('');
        }

        function showTab(tab) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            event.target.classList.add('active');
            if (tab === 'atividades') loadAtividades();
            if(tab === 'manut') loadManut();
        }

        async function loadAtividades() {
  const res = await fetch('/atividades-hoje');
  const dados = await res.json();
  const container = document.getElementById('lista-atividades');

  if (!dados.length) {
    container.innerHTML = '<p style="color:#888">Nenhuma atividade registrada hoje.</p>';
    return;
  }

  const icones = {
    arrumacao: '🧹',
    troca_enxoval: '🛏️',
    checkout: '🚪',
    dispensa: '🙅'
  };

  const nomes = {
    arrumacao: 'Limpeza',
    troca_enxoval: 'Troca de enxoval',
    checkout: 'Check-out',
    dispensa: 'Dispensa'
  };

  container.innerHTML = dados.map(d => {
    const hora = new Date(d.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const icone = icones[d.tipo_servico] || '📌';
    const nome = nomes[d.tipo_servico] || d.tipo_servico;
    return `
      <div style="padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px;">
        ${icone} <strong>Quarto ${String(d.quarto_numero).padStart(2,'0')}</strong>
        — ${nome}
        <span style="color:#888; float:right;">${hora} · ${d.camareira_nome}</span>
      </div>
    `;
  }).join('');
}

        socket.on('update', () => loadQuartos());
        loadQuartos();
    </script>
</body>
</html>
